<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Finance Tracker</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">

        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

        <style>
        *, *::before, *::after {box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #f0ede8;
            --surface: #faf9f7;
            --surface2: #f5f3ef;
            --border: #e2ddd7;
            --border-strong: #c9c3bb;
            --text: #1a1714;
            --text-muted: #7a7470;
            --text-soft: #a09893;
            --accent: #2d5a3d;

            --accent-light: #e8f0ea;
            --accent-hover: #234830;
            --danger: #8b2020;

            --danger-light: #fdf0f0;
            --danger-border: #e8c0c0;
            --warning: #7a4f10;
            --warning-light: #fef8ee;
            --gold: #c9a84c;
            --mono: 'DM Mono', monospace;
            --sans: 'Sora', sans-serif;
            --radius: 10px;
            --radius-lg: 16px;
        }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
        }
        #loginPage {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .login-logo svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
            
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }
        .login-card p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        .field-group { margin-bottom: 1rem; }
        
        .field-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        input[type="text"],
        input[type="password"],
        input[type="number"],
        input[type="date"],
        select {
                width: 100%;
                padding: 0.65rem 0.85rem;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                background: var(--surface);
                color: var(--text);
                font-family: var(--sans);
                font-size: 0.9rem;
                outline: none;
                transition: border-color 0.15s;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 90, 61, 0.08);
        }
        input.error { border-color: var(--danger); }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-family: var(--sans);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-primary:active { transform: scale(0.98); }

        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .login-error {
            background: var(--danger-light);
            border: 1px solid var(--danger-border);
            color: var(--danger);
            padding: 0.65rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.82rem;
            margin-top: 0.75rem;
            display: none;
        }
        #appPage { display: none; min-height: 100vh; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10
        }
        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }
        .brand-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.75rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .user-chip span { font-weight: 600; color: var(--text); }

        .btn-logout {
            padding: 0.4rem 1rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--sans);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--danger);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-logout:hover { background: var(--danger-light); border-color: var(--danger-border); }

        .main { max-width: 1000px; margin: 0 auto; padding: 2rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 equal-width columns */
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
        }
        .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-family: var(--mono);
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .stat-value.green { color: var(--accent); }
        .stat-value.gold  { color: var(--gold); }

        .stat-sub {
        font-size: 0.75rem;
            color: var(--text-soft);
            margin-top: 0.25rem;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }
        .panel-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 0.75rem;
            align-items: end;
        }
        .form-field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .amount-wrap { position: relative; }
            
        .amount-wrap .currency {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.85rem;
            pointer-events: none;
        }
        .amount-wrap input { padding-left: 2rem; }

        .btn-add {
            padding: 0.65rem 1.5rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            height: 40px;
            transition: background 0.15s;
        }
        .btn-add:hover { background: var(--accent-hover); }

        .validation-msg {
            font-size: 0.78rem;
            color: var(--danger);
            margin-top: 0.5rem;
            display: none;
        }
        .chart-wrap { height: 180px; position: relative; }
            
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
        }
        .filter-bar select, .filter-bar input[type="text"] {
            width: auto;
            flex: 1;
            font-size: 0.82rem;
            padding: 0.45rem 0.75rem;
        }
        .filter-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-muted);
            white-space: nowrap;
        }
        table { width: 100%; border-collapse: collapse; }
            
        thead tr { border-bottom: 1px solid var(--border); }
            
        th {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-soft);
            padding: 0 0.75rem 0.75rem;
            text-align: left;
        }
        td {
            padding: 0.8rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
            color: var(--text);
        }
        tbody tr:last-child td { border-bottom: none; }
            
        tbody tr:hover { background: var(--surface2); }
            
        .mono { font-family: var(--mono); font-size: 0.85rem; }

        .btn-delete {
            padding: 0.3rem 0.75rem;
            background: none;
            border: 1px solid var(--danger-border);
            border-radius: var(--radius);
            color: var(--danger);
            font-family: var(--sans);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-delete:hover { background: var(--danger-light); }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-soft);
            font-size: 0.85rem;
        }
        #toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px); /* starts off-screen below the viewport */
            background: var(--text);
            color: #fff;
            padding: 0.65rem 1.25rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 500;
            transition: transform 0.3s ease; 
            z-index: 999;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        #toast.error { background: var(--danger); }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; /* only the top segment is opaque, creating the spinning arc */
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-grid  { grid-template-columns: 1fr 1fr; }
            .btn-add    { grid-column: 1 / -1; width: 100%;}
        }
        </style>
    </head>
    <body>
    <!-- Login Page -->
     <div id="loginPage">
        <div class="login-card">
            <!-- small logo -->
            <div class="login-logo">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12L10 5 10-5"/></svg>
            </div>
            <h1>Finance Tracker</h1>
            <p>Sign in to manage your expenses</p>

            <div class="feild-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="feild-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="currendt-password">
            </div>
            <button class="btn-primary" onclick="login()" id="loginBtn">Sign in</button>
            <div class="login-error" id="loginError">Invalid username or password.Try again</div>
        </div>
     </div>
     <div id="appPage">
        
     </div>
            <!-- Add Expenses -->
             <div class="card p-4 mb-4 shadow border-0">
                <h4>Add Expense</h4>
                <div class="row">
                    <div class="col">
                        <div class="input-group">
                            <span class="input-group-text">€</span>
                            <input type="number" id="amount" class="form-control" placeholder="Amount in EUR" step="0.01">
                        </div>
                    </div>
                    <div class="col">
                        <input type="text" id="description" class="form-control" placeholder="Description">
                    </div>
                </div>
                <div class="col">
                    <input type="date" id="date" class="form-control">
                </div>
                <div class="col">
                    <button class="btn btn-dark w-100" onclick="addExpense()">Add</button>
                </div>
            </div>
            <!-- Table -->
             <div class="card p-4 shadow">
                <h4>Expenses</h4>
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Amount (€)</th>
                            <th>Amount ($)</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTable"></tbody>
                </table>
            </div>
        </div>
        </div>
        <script>
            let currentUserId = null;

            // Get exchange rate (EUR  -> USD)
            async function getExchangeRate() {
                try {
                    let response = await fetch("https://open.er-api.com/v6/latest/EUR");
                    let data = await response.json();

                    console.log("USD Rate:", data.rates.USD);

                    return Number(data.rates.USD);
                } catch (error) {
                    console.error("API ERROR:", error);
                    return 1; // Fallback to 1 if API fails
                }
            }
            // Login
            async function login() {
                let user = {
                    username: document.getElementById("username").value,
                    password: document.getElementById("password").value
                };

                let response = await fetch("https://aiswarialajan124.pythonanywhere.com/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(user)
                });

                let data = await response.json();

                if (response.status === 200) {
                    currentUserId = data.user_id;
                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("appSection").style.display = "block";
                    loadExpenses();
                } else {
                    alert("Invalid username or password");
                }
            }
            // Load expenses and dashboard
            async function loadExpenses() {
                try {
                    let response = await fetch('https://aiswarialajan124.pythonanywhere.com/expenses');
                    let data = await response.json();

                    let rate = await getExchangeRate();

                    console.log("RATE USED:", rate);
                    
                    let table = document.querySelector("#expenseTable");
                    table.innerHTML = "";
                    
                    let total = 0;
                    let count = data.length;

                    data.forEach(exp => {
                        let euro = Number(exp.amount);
                        let usd = (euro * rate).toFixed(2);

                        total += euro;

                        let row = `
                        <tr>
                            <td>${exp.id}</td>
                            <td>€${euro}</td>
                            <td>$${usd}</td>
                            <td>${exp.description}</td>
                            <td>${exp.date}</td>
                            <td>
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteExpense(${exp.id})">
                                    Delete
                                </button>
                            </td>
                        </tr>
                        `;
                        table.innerHTML += row;
                    });
                    document.getElementById("totalAmount").innerText = total.toFixed(2);
                    document.getElementById("totalCount").innerText = count;
                } catch(error) {
                    console.error("LOAD ERROR:", error);
                }
            }
            // Add expense
            async function addExpense() {
                if (!currentUserId) {
                    alert("Please login first");
                    return;
                }
                let expense = {
                    amount: document.getElementById("amount").value,
                    description: document.getElementById("description").value,
                    category_id: 1, // Default category
                    user_id: currentUserId,
                    date: document.getElementById("date").value
                };
                await fetch("https://aiswarialajan124.pythonanywhere.com/expenses", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(expense)
                });
                loadExpenses();
            }
            // Delete expense
            async function deleteExpense(id) {
                console.log("Deleting ID:", id);

                await fetch(`https://aiswarialajan124.pythonanywhere.com/expenses/${id}`, {
                    method: "DELETE"
                });
                loadExpenses();
            }
            function logout() {
                currentUserId = null;

                document.getElementById("username").value = "";
                document.getElementById("password").value = "";
                
                document.getElementById("expenseTable").innerHTML = "";
                
                document.getElementById("appSection").style.display = "none";
                document.getElementById("loginSection").style.display = "block";
            }
        </script>
    </body>
</html>
