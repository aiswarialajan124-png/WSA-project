<!DOCTYPE html>
<html>
    <head>
        <title>Finance Tracker</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <h1 class="text-center mb-4">Finance Tracker</h1>

            <!-- Add Expenses -->
             <div class="card p-4 mb-4 shadow">
                <h4>Add Expense</h4>
                <div class="row">
                    <div class="col">
                        <input type="number" id="amount" class="form-control" placeholder="Amount">
                    </div>
                    <div class="col">
                        <input type="text" id="description" class="form-control" placeholder="Description">
                    </div>
                    <div class="col">
                        <input type="date" id="date" class="form-control">
                    </div>
                    <div class="col">
                        <button class="btn btn-primary w-100" onclick="addExpense()">Add</button>
                    </div>
                </div>
             </div>

             <!-- Table -->
              <div class="card p-4 shadow">
                <h4>Expenses</h4>
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Amount</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTable"></tbody>
                </table>
              </div>

        </div>
        <script>
            async function loadExpenses() {
                let response = await fetch("http://127.0.0.1:5000/expenses");
                let data = await response.json();

                let table = document.querySelector("#expenseTable");
                table.innerHTML = "";

                data.forEach(exp => {
                    let row = `
                    <tr>
                        <td>${exp.id}</td>
                        <td>${exp.amount}</td>
                        <td>${exp.description}</td>
                        <td>${exp.date}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteExpense(${exp.id})">
                                Delete
                            </button>
                        </td>
                    </tr>
                    `;
                    table.innerHTML += row;
                });
            }
            async function addExpense() {
                let expense = {
                    amount: document.getElementById("amount").value,
                    description: document.getElementById("description").value,
                    category_id: 1,
                    user_id: 1,
                    date: document.getElementById("date").value
                };
                await fetch("http://127.0.0.1:5000/expenses", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(expense)
                });
                loadExpenses();
            }
            async function deleteExpense(id) {
                console.log("Deleting ID:", id);
                 let response = await fetch(`http://127.0.0.1:5000/expenses/${id}`, {
                    method: "DELETE"
                });
                let data = await response.json();
                console.log(data);
                
                loadExpenses();
            }
            loadExpenses();
        </script>
    </body>
</html>
